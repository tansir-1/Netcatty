name: test

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install shell test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify generated Catty tool specs
        run: |
          npm run generate:capability-tools
          git diff --exit-code infrastructure/ai/harness/generated/cattyToolSpecs.json

      - name: Verify Codex App Server schema
        run: npm run check:codex-app-server-schema

      - name: Test
        run: npm test

  mosh-windows-conpty:
    name: mosh-windows-conpty
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Compile ConPTY test helpers
        shell: pwsh
        run: |
          $compiler = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $compiler)) { throw "csc.exe not found" }
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\netcatty-mosh-conpty" | Out-Null
          & $compiler /nologo /target:exe /out:"$env:RUNNER_TEMP\netcatty-mosh-conpty\ssh.exe" electron\bridges\fixtures\mosh-conpty-fake-ssh.cs
          if ($LASTEXITCODE -ne 0) { throw "failed to compile fake ssh" }
          & $compiler /nologo /target:exe /out:"$env:RUNNER_TEMP\netcatty-mosh-conpty\mosh-client.exe" electron\bridges\fixtures\mosh-conpty-fake-client.cs
          if ($LASTEXITCODE -ne 0) { throw "failed to compile fake mosh-client" }

      - name: Test Mosh handshake through ConPTY
        shell: pwsh
        env:
          NETCATTY_TEST_MOSH_SSH_EXE: ${{ runner.temp }}\netcatty-mosh-conpty\ssh.exe
          NETCATTY_TEST_MOSH_CLIENT_EXE: ${{ runner.temp }}\netcatty-mosh-conpty\mosh-client.exe
        run: |
          node --test electron/bridges/moshHandshake.test.cjs
          node electron/bridges/terminalBridge.moshConpty.integration.cjs
